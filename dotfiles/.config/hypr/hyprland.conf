# =====================================================================
# Config ATIVA (hyprlang) — maquina: darkstar (estacao, 2 monitores)
#
# Tudo desta config vive sob ~/.config/hypr/ (sem dependencias externas
# alem do estritamente necessario: ~/bin, ~/.config/polybar/*.sh compartilhados
# com o bspwm, /etc/environment e ~/.XCompose).
#
# Voltar pro experimento em Lua (quebra clique da waybar e dispatch legado):
#     mv ~/.config/hypr/guardados/hyprland.lua.off ~/.config/hypr/hyprland.lua
#     (hyprland.lua tem precedencia sobre este .conf; e preciso corrigir o
#      package.path dentro dele p/ apontar a guardados/)
# =====================================================================

$mod  = SUPER
$term = kitty
$scr  = ~/.config/hypr/scripts

# ---------------------------------------------------------------------
# POR MAQUINA — monitores, workspaces e a barra do waybar vivem em
# conf/host.conf, que e um SYMLINK escolhido por maquina:
#     conf/host.conf -> host-quasar.conf     (casa, 1 monitor)
#     conf/host.conf -> host-darkstar.conf   (trabalho, 2 monitores)
# Trocar de maquina:
#     ln -sf host-<maquina>.conf ~/.config/hypr/conf/host.conf
# (equivalente ao case "$(hostname)" do polybar/launch.sh)
# ---------------------------------------------------------------------
source = ~/.config/hypr/conf/host.conf

# ---------------------------------------------------------------------
# ENTRADA
# ---------------------------------------------------------------------
input {
    kb_layout  = us
    kb_variant = intl               # US-intl: ' vira dead key -> 'e=é ; 'c=ç via ~/.XCompose
    repeat_delay = 500
    repeat_rate  = 30
    numlock_by_default = true

    follow_mouse  = 1
    mouse_refocus = false           # ~ bspwm ignore_ewmh_focus (ver rules.conf)

    touchpad {
        natural_scroll = false
    }
    sensitivity = 0
}

# ---------------------------------------------------------------------
# GERAL
# bspwm: window_gap 4 / border_width 4 / split_ratio 0.52
# ---------------------------------------------------------------------
general {
    gaps_in     = 2                 # ~ window_gap 4 (aqui e meia-distancia)
    gaps_out    = 4
    border_size = 4

    col.active_border   = rgba(406ea5ee)    # bspwm focused_border_color
    col.inactive_border = rgba(4c566aaa)    # bspwm normal_border_color

    layout = dwindle
    allow_tearing = false
}

dwindle {
    # NAO usar "pseudotile" — removido no Hyprland 0.55.4.
    preserve_split = true          # mantem a direcao do split quando janelas fecham

    # ESPIRAL deterministico: 2a a direita, 3a embaixo, 4a a direita, ...
    #   0 = depende do cursor/tamanho | 1 = sempre esq/cima | 2 = sempre dir/baixo
    force_split = 2
    smart_split = false            # off: nao usar quadrante do cursor (quebraria o espiral)

    # opcional: janela nova entra com 50% da celula (1.0 = meio-a-meio)
    # default_split_ratio = 1.0
}

decoration {
    rounding = 0                    # bspwm nao tinha rounding

    # ATENCAO: hyprlang NAO aceita bloco em uma linha.
    blur {
        enabled = false             # ligue se quiser; custa GPU
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = true
    bezier    = suave, 0.05, 0.9, 0.1, 1.0
    animation = windows,    1, 4, suave
    animation = windowsOut, 1, 4, default
    animation = fade,       1, 4, default
    animation = workspaces, 1, 3, suave
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
    focus_on_activate        = false   # complementa o nofocus do Zoiper
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles   = true
}

cursor {
    inactive_timeout = 3            # <- unclutter
}

# WORKSPACES: definidos por maquina em conf/host.conf (ver acima).

# ---------------------------------------------------------------------
# AUTOSTART (traduzido do fim do bspwmrc)
# ---------------------------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# waybar: lancada por conf/host.conf (config difere por maquina)   # <- polybar
exec-once = swaync                                   # <- dunst
exec-once = hypridle                                 # <- xidlehook
exec-once = pypr                                     # daemon do pyprland (scratchpad term)
exec-once = wl-paste --watch cliphist store
exec-once = $scr/wallpaper.sh                        # <- feh --bg-fill --randomize
exec-once = nm-applet --indicator
exec-once = udiskie
exec-once = sh -c 'pgrep -x dropbox >/dev/null || dropbox'
exec-once = $term

# ---------------------------------------------------------------------
# MODULOS — os .conf vivem em conf/
# ---------------------------------------------------------------------
source = ~/.config/hypr/conf/binds.conf
source = ~/.config/hypr/conf/rules.conf
source = ~/.config/hypr/conf/scratchpads.conf
