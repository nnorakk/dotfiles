# =====================================================================
# WINDOW RULES
#
# SINTAXE DESTE BUILD (Hyprland 0.55.4, config "legacy" hyprlang):
#   windowrule = CAMPO valor, CAMPO valor, ..., match:class REGEX
#   - pares "campo valor" separados por virgula (NAO tem "="; NAO tem bloco).
#   - o matcher e um campo: match:class REGEX  ou  match:title REGEX
#   - efeitos booleanos EXIGEM valor:  float true / center true / pin true /
#     fullscreen true / maximize true / no_focus true
#   - efeitos com argumento:  workspace N [silent] / size L A / move X Y /
#     suppress_event maximize / idle_inhibit fullscreen
#   (windowrulev2 foi unificado no windowrule e esta deprecado.)
#
# O class/title do app se descobre com:  hyprctl clients | grep -E 'class|title'
# =====================================================================

# vlc em fullscreen
windowrule = fullscreen true, match:class ^(vlc)$

# xfreerdp: workspace 8, flutuante, centralizado
windowrule = workspace 8, float true, center true, match:class ^(xfreerdp)$

# rdesktop: workspace 8, fullscreen
windowrule = workspace 8, fullscreen true, match:class ^(rdesktop)$

# gnome-calculator: flutuante, posicao fixa
windowrule = float true, move 1550 60, match:class ^(gnome-calculator)$

# Remmina: workspace 7, fullscreen
windowrule = workspace 7, fullscreen true, match:class ^(org\.remmina\.Remmina)$

# Bashtop: flutuante
windowrule = float true, match:class ^(Bashtop)$

# Ranger: flutuante
windowrule = float true, match:class ^(Ranger)$

# Calendar: flutuante, tamanho/posicao fixos, sempre acima
windowrule = float true, size 680 770, move 540 110, pin true, match:class ^(Calendar)$

# Fzfsearch: flutuante, tamanho/posicao fixos, sempre acima
windowrule = float true, size 680 770, move 540 110, pin true, match:class ^(Fzfsearch)$

# Marcacao: flutuante, centralizado, sempre acima
windowrule = float true, size 980 770, center true, pin true, match:class ^(Marcacao)$

# Zathura: flutuante, tamanho/posicao fixos, sempre acima
windowrule = float true, size 980 1020, move 540 40, pin true, match:class ^(org\.pwmt\.zathura)$

# Zoiper5: workspace 7 (sem seguir), flutuante, sem roubar o foco
windowrule = workspace 7 silent, float true, no_focus true, match:class ^(Zoiper5)$

# obs: workspace 7, sem seguir
windowrule = workspace 7 silent, match:class ^(com\.obsproject\.Studio)$

# IRPF: flutuante
windowrule = float true, match:class ^(serpro-ppgd-app-IRPFPGD)$

# Sxiv: flutuante
windowrule = float true, match:class ^(Sxiv)$

# Vpn: workspace 8 (sem seguir), fullscreen
windowrule = workspace 8 silent, fullscreen true, match:class ^(Vpn)$

# Kittyfloat: flutuante, tamanho/posicao fixos
windowrule = float true, size 680 770, move 540 110, match:class ^(Kittyfloat)$

# =====================================================================
# Gerais
# =====================================================================

# apps que se auto-maximizam
windowrule = suppress_event maximize, match:class .*

windowrule = float true, match:class ^(pavucontrol)$
windowrule = float true, match:class ^(nm-connection-editor)$
windowrule = float true, match:class ^(blueman-manager)$

# Picture-in-Picture do navegador
windowrule = float true, pin true, match:title ^(Picture-in-Picture)$

# Nao suspender a tela vendo video em fullscreen
windowrule = idle_inhibit fullscreen, match:class .*
