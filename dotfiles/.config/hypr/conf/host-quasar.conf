# =====================================================================
# HOST: quasar (casa) — 1 monitor (Acer CB242Y, DP-1, 1920x1080)
# Ativado por:  ln -sf host-quasar.conf ~/.config/hypr/conf/host.conf
# =====================================================================

# --- Monitor -----------------------------------------------------------
# Monitor unico: nao fixo por desc:/nome. "preferred, auto" pega o que
# houver na melhor resolucao. Se um dia plugar um segundo, ele so aparece.
monitor = , preferred, auto, 1

# --- Workspaces (1..8 num monitor so) ---------------------------------
# SEM "monitor:" — com um monitor unico todos caem nele automaticamente.
# (Na darkstar eles sao pregados por desc: a cada tela; aqui nao precisa.)
workspace = 1, default:true, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true

# --- Barra (waybar sem o modulo de consultaponto) ---------------------
exec-once = waybar -c ~/.config/hypr/waybar/config-quasar.jsonc -s ~/.config/hypr/waybar/style.css
# atualiza o icone da VPN na hora (dispara SIGRTMIN+8 na waybar em cada
# mudanca da interface do tunel SonicWall)
exec-once = ~/.config/hypr/waybar/scripts/vpn-watch.sh
