# =====================================================================
# HOST: darkstar (trabalho) — 2 monitores
#   DP-2 = LG ULTRAWIDE 3440x1440  -> principal, esquerda
#   DP-3 = AOC 24P1W1 1920x1080    -> auxiliar, direita
# Ativado por:  ln -sf host-darkstar.conf ~/.config/hypr/conf/host.conf
# desc: e estavel entre reboots (o conector DP-x pode mudar de porta).
# =====================================================================

# --- Monitores ---------------------------------------------------------
monitor = desc:LG Electronics LG ULTRAWIDE 210AZPUFE632, preferred, 0x0, 1
monitor = desc:AOC 24P1W1 GNSM7XA014090, preferred, 3440x0, 1
monitor = , preferred, auto, 1                 # fallback p/ qualquer outro

# --- Workspaces (1..8 no LG ultrawide ; 9,10 no AOC) -------------------
workspace = 1,  monitor:desc:LG Electronics LG ULTRAWIDE 210AZPUFE632, default:true, persistent:true
workspace = 2,  monitor:desc:LG Electronics LG ULTRAWIDE 210AZPUFE632, persistent:true
workspace = 3,  monitor:desc:LG Electronics LG ULTRAWIDE 210AZPUFE632, persistent:true
workspace = 4,  monitor:desc:LG Electronics LG ULTRAWIDE 210AZPUFE632, persistent:true
workspace = 5,  monitor:desc:LG Electronics LG ULTRAWIDE 210AZPUFE632, persistent:true
workspace = 6,  monitor:desc:LG Electronics LG ULTRAWIDE 210AZPUFE632, persistent:true
workspace = 7,  monitor:desc:LG Electronics LG ULTRAWIDE 210AZPUFE632, persistent:true
workspace = 8,  monitor:desc:LG Electronics LG ULTRAWIDE 210AZPUFE632, persistent:true
workspace = 9,  monitor:desc:AOC 24P1W1 GNSM7XA014090, default:true, persistent:true
workspace = 10, monitor:desc:AOC 24P1W1 GNSM7XA014090, persistent:true

# --- Barra (waybar cheia, com consultaponto) --------------------------
exec-once = waybar -c ~/.config/hypr/waybar/config.jsonc -s ~/.config/hypr/waybar/style.css

# --- Widget de fundo (eww): saldo de ponto no monitor auxiliar (AOC/DP-3) --
#     Porta do conky.conf.5 (X11) para a layer "bg" do Wayland. So aqui,
#     pois depende do 2o monitor e do coletor de ponto do trabalho.
#     Via launcher: o indice de monitor do eww nao e estavel entre logins,
#     entao ele descobre em runtime qual e o AOC (pelo modelo) e abre la.
exec-once = $scr/eww-saldo.sh "24P1W1"
