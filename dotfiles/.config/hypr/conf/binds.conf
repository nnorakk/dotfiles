# =====================================================================
# BINDS
# =====================================================================

# ---------------------------------------------------------------------
# atalhos independentes do WM
# ---------------------------------------------------------------------
bind = $mod, Return, exec, $term                                   # terminal
bind = $mod, space,  exec, rofi -modi drun,run -show drun -show-icons  # launcher
bind = $mod, Escape, exec, hyprctl reload                          # recarrega a config

# encerrar / recarregar
bind = $mod SHIFT, E, exit                                         # encerra a sessao
bind = $mod ALT, R, exec, hyprctl reload

# fechar / matar janela
bind = $mod,       W, killactive
bind = $mod SHIFT, W, forcekillactive
bind = ALT,        W, killactive
bind = ALT SHIFT,  W, forcekillactive
# alternativa em Q (ao lado do W)
bind = $mod,       Q, killactive                                   # fechar janela
bind = $mod SHIFT, Q, forcekillactive                             # matar a forca

# maximizar (monocle)
bind = $mod, M, fullscreen, 1

# manda a janela marcada para a raiz da arvore
bind = $mod, Y, layoutmsg, movetoroot

# ---------------------------------------------------------------------
# estado da janela: tiled / pseudo / floating / fullscreen
# ---------------------------------------------------------------------
bind = $mod,       T, settiled
bind = $mod SHIFT, T, pseudo
bind = $mod,       S, setfloating
bind = $mod,       F, fullscreen, 0

# fixar (sticky) em todos os workspaces
bind = $mod CTRL, Y, pin

# ---------------------------------------------------------------------
# foco / troca
# ---------------------------------------------------------------------
bind = $mod,       H, movefocus, l
bind = $mod,       J, movefocus, d
bind = $mod,       K, movefocus, u
bind = $mod,       L, movefocus, r
bind = $mod SHIFT, H, swapwindow, l
bind = $mod SHIFT, J, swapwindow, d
bind = $mod SHIFT, K, swapwindow, u
bind = $mod SHIFT, L, swapwindow, r

# ciclar janelas no workspace
bind  = $mod,       C, cyclenext
bind  = $mod SHIFT, C, cyclenext, prev
bind  = ALT,        C, cyclenext
bind  = ALT SHIFT,  C, cyclenext, prev

# workspace anterior / proximo
bind = $mod, bracketleft,  workspace, e-1
bind = $mod, bracketright, workspace, e+1

# ultima janela focada
bind = $mod, Tab, focuscurrentorlast

# ciclar no historico de foco
bind = $mod, O, cyclenext, prev
bind = $mod, I, cyclenext

# ---------------------------------------------------------------------
# preselect — direcao onde a proxima janela abre.
# O wrapper preselect-hint.sh dispara o preselect E mostra um bloco
# translucido onde a janela vai cair (feedback estilo bspwm).
# ---------------------------------------------------------------------
bind = $mod CTRL, H, exec, $scr/preselect-hint.sh l
bind = $mod CTRL, J, exec, $scr/preselect-hint.sh d
bind = $mod CTRL, K, exec, $scr/preselect-hint.sh u
bind = $mod CTRL, L, exec, $scr/preselect-hint.sh r
bind = $mod CTRL, space, exec, $scr/preselect-hint.sh none         # cancela

# proporcao do split do no atual (super+ctrl+{1-9})
bind = $mod CTRL, 1, layoutmsg, splitratio exact 0.1
bind = $mod CTRL, 2, layoutmsg, splitratio exact 0.2
bind = $mod CTRL, 3, layoutmsg, splitratio exact 0.3
bind = $mod CTRL, 4, layoutmsg, splitratio exact 0.4
bind = $mod CTRL, 5, layoutmsg, splitratio exact 0.5
bind = $mod CTRL, 6, layoutmsg, splitratio exact 0.6
bind = $mod CTRL, 7, layoutmsg, splitratio exact 0.7
bind = $mod CTRL, 8, layoutmsg, splitratio exact 0.8
bind = $mod CTRL, 9, layoutmsg, splitratio exact 0.9

# ---------------------------------------------------------------------
# mover / redimensionar
# ---------------------------------------------------------------------
# redimensionar (super+alt+hjkl) e o inverso com shift
binde = $mod ALT,       H, resizeactive, -20 0
binde = $mod ALT,       J, resizeactive, 0 20
binde = $mod ALT,       K, resizeactive, 0 -20
binde = $mod ALT,       L, resizeactive, 20 0
binde = $mod ALT SHIFT, H, resizeactive, 20 0
binde = $mod ALT SHIFT, J, resizeactive, 0 -20
binde = $mod ALT SHIFT, K, resizeactive, 0 20
binde = $mod ALT SHIFT, L, resizeactive, -20 0

# mover janela flutuante (super + setas)
binde = $mod, left,  moveactive, -40 0
binde = $mod, down,  moveactive, 0 40
binde = $mod, up,    moveactive, 0 -40
binde = $mod, right, moveactive, 40 0

# mouse: alt + botao esq move, alt + botao dir redimensiona
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

# ---------------------------------------------------------------------
# SUBMAP "apps"  <- super + x; {b,r,c,v,o,p,m,k}
# Esc ou qualquer outra tecla sai.
# ---------------------------------------------------------------------
bind = $mod, X, submap, apps
submap = apps
bind = , B, exec, kitty --class Bashtop  -e bashtop
bind = , B, submap, reset
bind = , R, exec, kitty --class Ranger   -e ranger
bind = , R, submap, reset
bind = , C, exec, kitty -c ~/.config/kitty/gruvbox_light.conf --class Calendar -e testecal
bind = , C, submap, reset
bind = , V, exec, kitty --class Vim      -e vim
bind = , V, submap, reset
bind = , O, exec, kitty -c ~/.config/kitty/gruvbox_light.conf --class Fzfsearch -e fzfsearch
bind = , O, submap, reset
bind = , P, exec, kitty --class Vpn      -e tmux-vpn-sonicwall.sh
bind = , P, submap, reset
bind = , M, exec, kitty --class Marcacao -o font_size=15 -e consulta_marcacao.sh
bind = , M, submap, reset
bind = , K, exec, kitty --class Kittyfloat
bind = , K, submap, reset
bind = , escape, submap, reset
submap = reset

# ---------------------------------------------------------------------
# SUBMAP "layout"  <- super + e; {1..9}
# ---------------------------------------------------------------------
bind = $mod, E, submap, layout
submap = layout
bind = , 1, exec, hyprctl keyword general:layout dwindle          # tiled
bind = , 1, submap, reset
bind = , 2, fullscreen, 1                                          # monocle
bind = , 2, submap, reset
bind = , 3, exec, hyprctl keyword general:layout master           # even
bind = , 3, submap, reset
bind = , 6, layoutmsg, orientationright                            # rtall
bind = , 6, submap, reset
bind = , 7, layoutmsg, orientationbottom                           # rwide
bind = , 7, submap, reset
bind = , 8, layoutmsg, orientationleft                             # tall
bind = , 8, submap, reset
bind = , 9, layoutmsg, orientationtop                              # wide
bind = , 9, submap, reset
bind = , escape, submap, reset
submap = reset

# ciclar orientacao do layout
bind = $mod, Next,  layoutmsg, orientationnext
bind = $mod, Prior, layoutmsg, orientationprev

# ---------------------------------------------------------------------
# WORKSPACES
# ---------------------------------------------------------------------
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT, 0, movetoworkspacesilent, 10

# alt + {1-9,0}  -> focar workspace (conjunto alternativo)
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

# super + shift + alt + {1-9,0}  -> enviar a janela e seguir
bind = $mod SHIFT ALT, 1, movetoworkspace, 1
bind = $mod SHIFT ALT, 2, movetoworkspace, 2
bind = $mod SHIFT ALT, 3, movetoworkspace, 3
bind = $mod SHIFT ALT, 4, movetoworkspace, 4
bind = $mod SHIFT ALT, 5, movetoworkspace, 5
bind = $mod SHIFT ALT, 6, movetoworkspace, 6
bind = $mod SHIFT ALT, 7, movetoworkspace, 7
bind = $mod SHIFT ALT, 8, movetoworkspace, 8
bind = $mod SHIFT ALT, 9, movetoworkspace, 9
bind = $mod SHIFT ALT, 0, movetoworkspace, 10

# enviar a janela para o outro monitor
bind = $mod SHIFT, equal, movewindow, mon:+1

# ---------------------------------------------------------------------
# Customizacoes
# ---------------------------------------------------------------------
# lockscreen — pidof evita abrir dois lockscreens (mesmo guard nos dois atalhos)
bind = ALT SHIFT, X, exec, pidof hyprlock || hyprlock
bind = CTRL ALT,  L, exec, pidof hyprlock || hyprlock

# desligar a tela
bind = ALT SHIFT, C, exec, sleep 0.5 && hyprctl dispatch dpms off

# screenshot — captura + anota (satty) + copiar/salvar
bind = , Print,      exec, $scr/screenshot.sh area                 # area, com editor
bind = SHIFT, Print, exec, $scr/screenshot.sh screen              # tela toda, com editor
bind = CTRL, Print,  exec, grimblast --notify copysave area        # rapido, sem editor

# inverte o split do no atual
bind = $mod SHIFT, R, layoutmsg, togglesplit

# rolar janelas na arvore
bind = $mod SHIFT, D, layoutmsg, rollnext
bind = $mod SHIFT, A, layoutmsg, rollprev

# gaps dinamicos em runtime (super+alt+brackets)
bind = $mod ALT, bracketleft,  exec, $scr/gaps.sh -5
bind = $mod ALT, bracketright, exec, $scr/gaps.sh +5

# alternar entre janelas abertas
bind = $mod ALT, space, exec, rofi -show window

# menu de desktops remotos
bind = $mod SHIFT, space, exec, ~/bin/rofi-remote-desktops.sh

# ocultar / reexibir janela
bind = $mod SHIFT, I, movetoworkspacesilent, special:hidden
bind = ALT,        I, togglespecialworkspace, hidden
# oculta TODAS as janelas do workspace
bind = $mod, D, exec, $scr/hide-all.sh

# padding tipo monocle para ultrawide
bind = $mod, N, exec, $scr/ultrawide.sh

# central de notificacoes (swaync)
# super+N ja e o ultrawide; a central fica no shift e o nao-perturbe no ctrl.
bind = $mod SHIFT, N, exec, swaync-client -t -sw                   # abre/fecha a central (historico)
bind = $mod CTRL,  N, exec, swaync-client -d -sw                   # liga/desliga nao-perturbe

# ---------------------------------------------------------------------
# Audio / brilho
# ---------------------------------------------------------------------
bindle = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindle = , XF86AudioLowerVolume, exec, pamixer -d 5
bind   = , XF86AudioMute,        exec, pamixer -t
bind   = , XF86AudioMicMute,     exec, pamixer --default-source -t
bindle = , XF86MonBrightnessUp,   exec, brightnessctl -q s +10%
bindle = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-
bind   = , XF86AudioPlay, exec, playerctl play-pause
bind   = , XF86AudioNext, exec, playerctl next
bind   = , XF86AudioPrev, exec, playerctl previous

# botoes laterais do mouse -> volume
bind = , mouse:276, exec, pamixer -i 5
bind = , mouse:275, exec, pamixer -d 5
