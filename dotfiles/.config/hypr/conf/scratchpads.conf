# =====================================================================
# SCRATCHPADS — substituem o tdrop (X11-puro, nao roda em Wayland)
#
# No Hyprland isso e nativo via "special workspaces": nao ha processo
# externo, nao ha xdotool. on-created-empty sobe o app na primeira vez.
#
# O terminal dropdown (term) foi movido para o pyprland, que anima a descida
# e esconde ao perder o foco (ver ~/.config/hypr/pyprland.toml). Os demais
# scratchpads seguem nativos.
# =====================================================================

# --- terminal dropdown  <- super + ctrl + Return (era: tdrop -am -w -18 kitty)
#     Via pyprland: desce do topo + some ao clicar fora. Config no pyprland.toml.
bind = $mod CTRL, Return, exec, pypr toggle term

# --- tmux-scratch  <- super + shift + Return
#     era: "$HOME/bin/tmux-scratch" ; tdrop -am -w -18 -s scratch kitty
bind = $mod SHIFT, Return, togglespecialworkspace, scratch
workspace = special:scratch, on-created-empty:sh -c '$HOME/bin/tmux-scratch; kitty --class Scratchtmux'
windowrule = size 90% 60%, center true, match:class ^(Scratchtmux)$

# --- fechar o tmux-scratch  <- super + shift + Escape
bind = $mod SHIFT, Escape, exec, $HOME/bin/stop-tmux-scratch

# --- gaveta de janelas ocultas (substitui ~/bin/winhide)
#     super+shift+I manda a janela pra ca; alt+I traz de volta
workspace = special:hidden

# --- VPN em scratchpad (opcional; hoje voce usa desktop 8)
# bind = $mod CTRL, P, togglespecialworkspace, vpn
# workspace = special:vpn, on-created-empty:kitty --class Vpn -e tmux-vpn-sonicwall.sh
