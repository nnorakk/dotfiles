-- vim: ts=4 sw=4 noet ai cindent syntax=lua
--[[
Conky calendar - mostra o calendario do mes (semelhante ao comando 'cal'),
destacando o dia atual.

Cores baseadas em conky.conf.4 (azuis) e conky.conf.5.
]]

conky.config = {

-- Various settings
background = true,
double_buffer = true,
no_buffers = true,
text_buffer_size = 2048,
update_interval = 60,
imlib_cache_size = 0,
xinerama_head = 1,

-- Placement
alignment = 'top_middle',
gap_x = 0,
gap_y = 55,
minimum_width = 195,
maximum_width = 195,
minimum_height = 10,

-- Graphical
border_inner_margin = 12,
border_outer_margin = 10,
draw_borders = false,
draw_graph_borders = false,
draw_shades = false,
draw_outline = false,
own_window = true,
own_window_argb_visual = true,
own_window_argb_value = 192,
own_window_transparent = false,
own_window_type = 'override',
own_window_class = 'Conky',
own_window_hints = 'undecorated,below,skip_taskbar,sticky,skip_pager',

-- Text
font = 'JetBrains Mono:size=13',
use_xft = true,
override_utf8_locale = true,
max_text_width = 0,
short_units = true,
xftalpha = 1,
uppercase = false,
use_spacer = 'none',

-- Colors
default_color = 'white',
default_outline_color = 'white',
default_shade_color = 'white',
-- destaque do MES (ambar/laranja)
color1 = 'FFB74D',
-- md light blue -- subtitulo / cabecalho dos dias
color2 = 'e6ffff',
-- md blue (200) -- texto
color3 = '90caf9',
-- destaque do DIA ATUAL (verde vivo)
color4 = '69F0AE',

}

conky.text = [[
${font JetBrains Mono:size=24}${color1}${alignc}${time %B}
${font JetBrains Mono:size=14}${color2}${voffset -6}${alignc}${time %Y}
${color3}${hr 2}
${voffset 4}${font JetBrains Mono:size=13}${color2}${execi 3600 cal | sed -n '2p'}
${color}${execpi 300 cal | tail -n +3 | sed "s/\b$(date +%-d)\b/\${color4}$(date +%-d)\${color}/"}
]]
