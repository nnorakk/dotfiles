# Mudar a tecla PREFIX
set -g prefix C-Space
unbind-key C-b

# use vi key in buffer
setw -g mode-keys vi

# Propaga variáveis de ambiente para novas janelas/paineis
set-option -g update-environment "KUBECONFIG SSH_AUTH_SOCK DISPLAY"

# seta o numero de linhas do buffer
set-option -g history-limit 10000

# Cor e italico dentro do tmux, a opcao screen-256color nao funciona o italico
set-option -g default-terminal "tmux-256color"
# Tell tmux that "xterm-256color" (the terminal emulator outside tmux) supports true color
set-option -g terminal-overrides ",xterm-256color:RGB"

# seta background color para destacar o pane selecionado
set-option -g window-style 'bg=#333333'
set-option -g window-active-style 'bg=terminal'
set-option -g @theme-pane-active-border-bg "#333333"
set-option -g @theme-pane-border-bg "#333333"

# seta o shell para zsh se chamado a partir do zsh
# unica forma que achei foi testar a variavel
# nao sei se se nao tiver o oh-my-zsh instalado funcionaria
if-shell '[[ $(uname -s) = "Darwin" ]]' 'set -g default-shell /bin/zsh' 'set -g default-shell /usr/bin/zsh'

# Seta indice da janela para 1
set -g base-index 1

# Seta indice do pane para 1
set -g pane-base-index 1

# renumera automaticamente as janelas
set-option -g renumber-windows on

# habilita o suporte ao mouse
set -g mouse on

# habilita eventos de foco
set -g focus-events on

# Reload arquivo de configuracao
bind-key r source-file ~/.tmux.conf \; display "Reloaded!"

# splitting panes with | and - and open with the same path of current
bind-key - split-window -v -c '#{pane_current_path}'
bind-key | split-window -h -c '#{pane_current_path}'
bind-key '\' split-window -h -c '#{pane_current_path}'

# Nova janela mantendo o path atual
bind c new-window -c "#{pane_current_path}"

# move janela para esquerda ou direita
# https://github.com/wincent/wincent/blob/master/aspects/dotfiles/files/.tmux.conf
bind-key -r '<' run-shell 'idx=$(tmux display-message -p "#{window_index}"); if [ "$idx" -eq 1 ]; then last=$(tmux display-message -p "#{session_windows}"); tmux swap-window -d -t ":$last"; else tmux swap-window -d -t "{previous}"; fi'
bind-key -r '>' run-shell 'idx=$(tmux display-message -p "#{window_index}"); last=$(tmux display-message -p "#{session_windows}"); if [ "$idx" -eq "$last" ]; then tmux swap-window -d -t :1; else tmux swap-window -d -t "{next}"; fi'

# equaliza tamanho do panes
bind-key = select-layout tile

# Vim-like key bindings for pane navigation (default uses cursor keys).
unbind-key h
bind-key h select-pane -L
unbind-key j
bind-key j select-pane -D
unbind-key k
bind-key k select-pane -U
unbind-key l # normally used for last-window
bind-key l select-pane -R

# Resizing (mouse also works).
unbind-key Left
bind-key -r Left resize-pane -L 5
unbind-key Right
bind-key -r Right resize-pane -R 5
unbind-key Down
bind-key -r Down resize-pane -D 5
unbind-key Up
bind-key -r Up resize-pane -U 5

# =============================================================================
# Movimentação e reorganização de panes
# =============================================================================

# --- Mover/reposicionar o pane atual na direção (H / J / K / L) --------------
# Espelha a navegação vim-like em h/j/k/l (minúsculo), mas com Shift para
# REPOSICIONAR espacialmente o pane dentro do layout, em vez de apenas mover o
# foco. Diferente de "swap-pane -U/-D" (que troca por ordem de índice), o
# "move-pane" abaixo reposiciona de fato para cima/baixo/esquerda/direita.
#   -h  divide horizontalmente (lado a lado)  | -v  divide verticalmente (empilhado)
#   -b  coloca o pane ANTES do alvo (before)  | -f  usa a janela inteira (full size) como referência
#   -t '{next}'  usa o próximo pane como alvo do reposicionamento
# Requer tmux >= 3.3 pela sintaxe de bloco { }.
bind-key H { move-pane -hbf -t '{next}' }   # move para a esquerda
bind-key J { move-pane -vf  -t '{next}' }   # move para baixo
bind-key K { move-pane -vbf -t '{next}' }   # move para cima
bind-key L { move-pane -hf  -t '{next}' }   # move para a direita

# --- Rotacionar todos os panes da janela ------------------------------------
# Gira a posição de todos os panes da janela de uma só vez (útil para
# reorganizar rapidamente sem mover um a um). prefix + C-o.
bind-key C-o rotate-window

# --- Quebrar (break) e juntar (join) panes ----------------------------------
# break-pane: "explode" o pane atual para uma janela nova e própria.
bind-key b break-pane

# join-pane: traz um pane de outra janela para a atual como split horizontal
# (lado a lado). Abre um prompt pedindo o alvo de origem, ex.: 3.1 = janela 3,
# pane 1. Útil para reagrupar um pane que foi separado.
bind-key @ command-prompt -p "join pane de:" "join-pane -h -s '%%'"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# Clear
bind-key C-l send-keys C-l
bind-key C-k send-keys C-k

# Clipboard (tmux <-> sistema operacional) — PORTAVEL: macOS / Wayland / X11.
# Deteccao em runtime dentro de cada bind:
#   pbcopy/pbpaste (macOS) | wl-copy/wl-paste (Wayland) | xsel (X11).
# - Copia (y no copy-mode-vi, ou arrasto do mouse) -> CLIPBOARD (+ PRIMARY no Linux).
# - Cola no tmux com C-p ou prefix + ]: le CLIPBOARD; se vazio, cai p/ PRIMARY.
# - set-clipboard on mantem OSC 52 (util em SSH / terminais remotos).
# Fluxo no copy-mode-vi: prefix + [ , seleciona com v, copia com y.
set -g set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection

# copiar: escreve a selecao no clipboard do sistema (detecta o ambiente)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'd=$(cat); if command -v pbcopy >/dev/null 2>&1; then printf %s "$d" | pbcopy; elif [ -n "$WAYLAND_DISPLAY" ]; then printf %s "$d" | wl-copy; printf %s "$d" | wl-copy -p; else printf %s "$d" | xsel -ib; printf %s "$d" | xsel -ip; fi'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'd=$(cat); if command -v pbcopy >/dev/null 2>&1; then printf %s "$d" | pbcopy; elif [ -n "$WAYLAND_DISPLAY" ]; then printf %s "$d" | wl-copy; printf %s "$d" | wl-copy -p; else printf %s "$d" | xsel -ib; printf %s "$d" | xsel -ip; fi'

# colar: le o clipboard do sistema (fallback PRIMARY) para dentro do tmux
bind-key -n C-p run-shell 'if command -v pbpaste >/dev/null 2>&1; then c=$(pbpaste); elif [ -n "$WAYLAND_DISPLAY" ]; then c=$(wl-paste -n 2>/dev/null); [ -n "$c" ] || c=$(wl-paste -n -p 2>/dev/null); else c=$(xsel -ob 2>/dev/null); [ -n "$c" ] || c=$(xsel -op 2>/dev/null); fi; if [ -n "$c" ]; then tmux set-buffer -- "$c"; tmux paste-buffer; else tmux display-message "clipboard vazio ou indisponivel"; fi'
bind-key ] run-shell 'if command -v pbpaste >/dev/null 2>&1; then c=$(pbpaste); elif [ -n "$WAYLAND_DISPLAY" ]; then c=$(wl-paste -n 2>/dev/null); [ -n "$c" ] || c=$(wl-paste -n -p 2>/dev/null); else c=$(xsel -ob 2>/dev/null); [ -n "$c" ] || c=$(xsel -op 2>/dev/null); fi; if [ -n "$c" ]; then tmux set-buffer -- "$c"; tmux paste-buffer; else tmux display-message "clipboard vazio ou indisponivel"; fi'

# tema alternativo tmux-power (mantido comentado). O changetmuxcolor.sh
# randomiza o @tmux_power_theme a cada start do servidor e so faz sentido
# junto do tmux-power, por isso acompanha.
# run-shell "${HOME}/bin/changetmuxcolor.sh"
# run-shell "${HOME}/.config/tmux-power/tmux-power.tmux"

# ── TPM: gerenciador de plugins ──
# Declare os plugins aqui com 'set -g @plugin'. Instalar: prefix + I.
# Atualizar: prefix + U. Remover nao-listados: prefix + alt+u.
set -g @plugin 'tmux-plugins/tpm'

# tema da status line
set -g @plugin 'uhs-robert/tmux-oasis'
set -g @oasis_flavor "desert_dark"   # fallback se o script abaixo nao existir

# randomiza o flavor do oasis a cada start do servidor tmux.
# Precisa rodar ANTES do 'run .../tpm' (que carrega o oasis) -- run-shell e'
# enfileirado, entao a ordem no arquivo garante isso.
run-shell "${HOME}/bin/changeoasisflavor.sh"

# inicializa o TPM: precisa ser SEMPRE a ultima linha do arquivo
run '~/.tmux/plugins/tpm/tpm'
